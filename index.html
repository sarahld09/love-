<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حبيبي محمد & سارة ❤️</title>
    <style>
        :root { 
            --bg-color: #000000; /* خلفية سوداء فخمة */
            --main-color: #111111; 
            --accent-color: #ff002b; /* قلوب باللون الأحمر الفاقع */
            --gold-color: #ffb703; 
            --text-color: #fff0f5; 
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            text-align: center; 
        }
        
        /* شاشة التحميل */
        #loader-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000000; 
            z-index: 10000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: all 0.5s ease; 
        }
        .spinner { 
            width: 60px; 
            height: 60px; 
            border: 5px solid rgba(255, 255, 255, 0.05); 
            border-top-color: var(--accent-color); 
            border-radius: 50%; 
            animation: spin 1s infinite linear; 
            margin-top: 25px; 
            box-shadow: 0 0 15px var(--accent-color);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* شاشة القفل */
        #lock-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000000; 
            z-index: 9999; 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        .login-box { 
            background: rgba(20, 20, 20, 0.8); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(255, 0, 43, 0.2); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 0, 43, 0.3); 
            max-width: 420px; 
            width: 85%; 
        }
        input[type="password"] { 
            width: 90%; 
            padding: 14px; 
            margin: 20px 0; 
            border: none; 
            border-radius: 25px; 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            text-align: center; 
            font-size: 18px; 
            outline: none; 
            border: 1px solid var(--accent-color); 
            transition: 0.3s;
        }
        input[type="password"]:focus {
            box-shadow: 0 0 10px var(--accent-color);
        }
        button.login-btn { 
            background: linear-gradient(45deg, var(--accent-color), #b3001e); 
            color: white; 
            border: none; 
            padding: 12px 40px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 25px; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(255, 0, 43, 0.4);
        }
        
        /* شاشة النجاح */
        #clever-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000000; 
            z-index: 9998; 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: var(--gold-color); 
            font-size: 32px; 
            font-weight: bold; 
            text-shadow: 0 0 10px var(--gold-color);
        }
        
        #main-content { display: none; opacity: 0; transition: opacity 1.5s ease; padding: 20px; position: relative; z-index: 2; }
        
        /* قلوب حمراء متطايرة */
        .heart { 
            position: fixed; 
            color: var(--accent-color); 
            font-size: 24px; 
            animation: fly 6s linear infinite; 
            pointer-events: none; 
            z-index: 1; 
            text-shadow: 0 0 8px rgba(255, 0, 43, 0.8);
        }
        @keyframes fly { 0% { transform: translateY(100vh) scale(0); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        
        .couple-header-name { 
            font-size: 3.8rem; 
            color: #ffffff; 
            font-weight: bold; 
            text-shadow: 0 0 15px var(--accent-color); 
            margin: 20px 0 10px 0; 
        }
        
        /* العداد */
        .counter-container { 
            background: rgba(15, 15, 15, 0.8); 
            margin: 40px auto; 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 650px; 
            border: 1px solid var(--accent-color); 
            box-shadow: 0 0 20px rgba(255, 0, 43, 0.15);
        }
        .timer { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 15px; }
        .timer div { font-size: 28px; font-weight: bold; color: var(--accent-color); min-width: 80px; margin: 10px; }
        .timer div small { color: #aaa; font-size: 14px; display: block; margin-top: 5px; }
        
        /* المربعات الإضافية */
        .extra-boxes { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin: 20px auto 40px auto; 
            max-width: 650px; 
        }
        .mini-box { 
            background: rgba(30, 30, 30, 0.9); 
            border: 1px solid var(--gold-color); 
            padding: 15px 25px; 
            border-radius: 12px; 
            flex: 1; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .mini-box span { display: block; font-size: 24px; font-weight: bold; color: var(--gold-color); }
        .mini-box small { color: #eee; font-size: 15px; }

        /* الرسالة الثانية السحرية */
        .magic-message-container { max-width: 650px; margin: 40px auto; position: relative; }
        .magic-btn { background: linear-gradient(45deg, var(--accent-color), #b3001e); color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 20px rgba(255, 0, 43, 0.4); transition: 0.3s; }
        .magic-text-box { display: none; background: rgba(20, 20, 20, 0.85); border: 2px dashed var(--accent-color); padding: 30px; border-radius: 20px; text-align: justify; line-height: 1.9; font-size: 17px; animation: fadeIn 1.5s ease-in-out; box-shadow: 0 0 25px rgba(255, 0, 43, 0.2); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* البطاقات المترتبة */
        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; max-width: 850px; margin: 40px auto; }
        @media (max-width: 650px) { .cards-grid { grid-template-columns: 1fr; } }
        .flip-card { background-color: transparent; width: 100%; min-height: 220px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .flip-card-front { background: linear-gradient(45deg, #151515, #252525); color: var(--gold-color); font-weight: bold; font-size: 18px; border: 1px solid rgba(255, 0, 43, 0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .flip-card-back { background: linear-gradient(135deg, #2a0006, #4d000c); color: #fff0f5; transform: rotateY(180deg); font-size: 15px; text-align: justify; line-height: 1.7; border: 1px solid var(--accent-color); overflow-y: auto; }
        .tall-card { min-height: 350px; }

        /* حاوية الصور */
        .stacked-images-container { max-width: 500px; margin: 50px auto; display: flex; flex-direction: column; gap: 30px; align-items: center; }
        .stacked-img { width: 100%; max-height: 450px; object-fit: cover; border-radius: 20px; border: 2px solid var(--accent-color); box-shadow: 0 10px 25px rgba(255, 0, 43, 0.3); transition: transform 0.3s ease; }
        .stacked-img:hover { transform: scale(1.03); }

        /* قلب معلق لمسج الدعاء الطويل */
        .big-heart-container { margin: 60px auto; max-width: 600px; position: relative; display: flex; justify-content: center; align-items: center; min-height: 400px; }
        .big-heart { background-color: #380007; display: inline-block; height: 320px; position: relative; transform: rotate(-45deg); width: 320px; border: 2px solid var(--accent-color); box-shadow: 0 10px 40px rgba(255, 0, 43, 0.4); }
        .big-heart:before, .big-heart:after { content: ""; background-color: #380007; border-radius: 50%; height: 320px; position: absolute; width: 320px; border: 2px solid var(--accent-color); }
        .big-heart:before { top: -160px; left: 0; border-bottom: none; border-right: none; }
        .big-heart:after { top: 0; left: 160px; border-bottom: none; border-left: none; }
        .heart-text { position: absolute; width: 75%; color: #fff; font-size: 15px; line-height: 1.8; font-weight: bold; text-align: center; z-index: 5; padding: 10px; direction: rtl; }

        /* لعبة تركيب الصورة Puzzle */
        .puzzle-section { max-width: 450px; margin: 50px auto; background: rgba(15, 15, 15, 0.8); padding: 25px; border-radius: 20px; border: 1px solid var(--gold-color); box-shadow: 0 0 20px rgba(255, 183, 3, 0.15); }
